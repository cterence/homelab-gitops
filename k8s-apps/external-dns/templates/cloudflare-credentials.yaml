apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-secret-store
  target:
    name: cloudflare-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: external-dns/cloudflare-credentials
