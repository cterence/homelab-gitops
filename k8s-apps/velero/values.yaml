  #       cpuLimit: 200m
  #       memLimit: 128Mi
  #       secCtx: |
  #         capabilities:
  #           drop:
  #           - ALL
  #           add: []
  #         allowPrivilegeEscalation: false
  #         readOnlyRootFilesystem: true
  #         runAsUser: 1001
  #         runAsGroup: 999
  configMaps: {}
    # remove-argocd-instance-label:
    #   labels: {}
    #   data:
    #     version: v1
    #     resourceModifierRules:
    #       - conditions:
    #           groupResource: "*.*"
    #           resourceNameRegex: "^.*$"
    #         patches:
    #           - operation: remove
    #             path: "/metadata/labels/argocd.argoproj.io~1instance"

  ##
  ## End of additional Velero resource settings.
  ##
