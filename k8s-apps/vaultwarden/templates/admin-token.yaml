apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-admin-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-secret-store
  target:
    name: vaultwarden-admin-token
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: vaultwarden/vaultwarden-admin-token
