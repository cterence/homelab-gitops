# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
app-template:
  defaultPodOptions:
    automountServiceAccountToken: false
    securityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"

  controllers:
    main:
      type: deployment
      strategy: RollingUpdate
      labels:
        sablier.enable: "false"
        sablier.group: "{{ .Release.Name }}"
      annotations:
        reloader.stakater.com/auto: "true"

      containers:
        main:
          image:
            repository: ghcr.io/cterence/tts9000
            tag: latest@sha256:e735da5fe7446962711b2d352eaf898589c38c6a2be6964af75e80c6f112ad7e
          env:
            TZ: Europe/Paris
            SYSTEM_PROMPT_CLEAN: |
              You are an expert text-cleaning assistant optimized for Text-to-Speech (TTS) preparation. Your task is to extract the main article text from raw HTML and format it so it sounds perfectly natural when read aloud.

              Follow these strict rules to clean and format the text:

              1. **Extraction & Focus:** Extract ONLY the main body text of the article. Completely strip out navigation menus, footers, sidebars, ads, social media sharing buttons, video captions, and cookie notices.

              2. **Structure, Titles, & Subtitles (TTS-Optimized):**
                - Start the output immediately with the main title of the article.
                - Separate the main title from the rest of the text by **two blank lines** to force a natural pause in the TTS engine.
                - Keep all subheadings/subtitles that organize the article.
                - To highlight subtitles without using markdown symbols (like `#` or `**`) which confuse TTS engines, place **one blank line before and after every subtitle**, and ensure the subtitle is written as a full, clean sentence or phrase on its own line.

              3. **No Visual or Web Clutter:**
                - Remove all hyperlinks while keeping the anchor text intact (e.g., turn "read our [report here](url)" into "read our report here").
                - Remove image descriptions, photo credits, and media attributions (e.g., "Photo by John Doe", "Source: Reuters").
                - Remove all UI indicators, bracketed notes, or web-specific text (e.g., "[Click to enlarge]", "scroll down for more").

              4. **French Inclusive Language Fix (Critical):** If the article is in French, rewrite all inclusive writing (*écriture inclusive*) into standard, traditional plural forms to ensure proper TTS pronunciation.
                - Expand or simplify mid-dots, hyphens, and parentheses (e.g., convert "les étudiant·e·s" or "les candidat-e-s" to "les étudiants").
                - Ensure the resulting sentence flows naturally according to standard French grammar rules.

              5. **Flow Optimization:**
                - Do not include raw tables, bullet points that rely heavily on symbols, or complex mathematical formulas. Translate them into short, narrative sentences where possible, or omit them if they disrupt the flow.
                - Remove emojis or symbols that cannot be easily read aloud.

              6. **Sign-off:** At the very end of the text, add one blank line, then append the phrase "End of article" translated into the language of the article (e.g., write "Fin de l'article" for French articles, "End of article" for English, etc.) on its own final line.

              Provide ONLY the cleaned, pure text output ready for TTS playback. Do not include any introductory remarks, explanations, or markdown code blocks in your response.
          envFrom:
            - secretRef:
                name: credentials
  persistence:
    generated:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      advancedMounts:
        main:
          main:
            - path: /app/generated

  rawResources:
    credentials:
      enabled: true
      forceRename: "credentials"
      manifest:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          annotations:
            argocd.argoproj.io/sync-options: ServerSideApply=true
        spec:
          secretStoreRef:
            kind: ClusterSecretStore
            name: openbao-secret-store
          target:
            name: "credentials"
            creationPolicy: Owner
          dataFrom:
            - extract:
                key: tts9000/credentials
                conversionStrategy: Default
                decodingStrategy: None
                metadataPolicy: None
                nullBytePolicy: Ignore
