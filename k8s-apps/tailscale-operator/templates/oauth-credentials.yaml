apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-oauth-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-secret-store
  target:
    name: operator-oauth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: tailscale-operator/operator-oauth
