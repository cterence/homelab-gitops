  configMaps:
    configarr-config:
      data:
        config.yml: |
          trashGuideUrl: https://github.com/TRaSH-Guides/Guides
          recyclarrConfigUrl: https://github.com/recyclarr/config-templates

          sonarr:
            series:
              base_url: http://arr-stack-sonarr:8989
              api_key: !secret SONARR_API_KEY

              quality_definition:
                type: series

              include:
                - template: sonarr-quality-definition-series
                - template: sonarr-v4-quality-profile-web-1080p
                - template: sonarr-v4-custom-formats-web-1080p
                - template: sonarr-v4-quality-profile-bluray-web-1080p-french-vostfr
                - template: sonarr-v4-custom-formats-bluray-web-1080p-french-vostfr

              custom_formats: []

          radarr:
            movies:
              base_url: http://arr-stack-radarr:7878
              api_key: !secret RADARR_API_KEY

              include:
                - template: radarr-quality-definition-movie
                - template: radarr-quality-profile-hd-bluray-web
                - template: radarr-custom-formats-hd-bluray-web
                - template: radarr-quality-profile-remux-web-1080p
                - template: radarr-custom-formats-remux-web-1080p
                - template: radarr-quality-profile-hd-bluray-web-french-vostfr
                - template: radarr-custom-formats-hd-bluray-web-french-vostfr
                - template: radarr-quality-profile-hd-remux-web-french-vostfr
                - template: radarr-custom-formats-hd-remux-web-french-vostfr

              custom_formats: []

    filebrowser-quantum-config:
      data:
        config.yaml: |
          server:
            port: 8080
            database: "database/database.db"
            sources:
              - path: /data
              - path: /music
          auth:
            methods:
              noauth: true
          userDefaults:
            permissions:
              api: true
              admin: true
              modify: true
              share: true
              realtime: true

    soularr-script:
      data:
        run-soularr.sh: |
          #!/bin/bash

          FILE=/data/.soularr.lock
          touch $FILE
          echo "created lockfile at $FILE"
          python -u /app/soularr.py
          echo "soularr done"
          rm $FILE
          echo "removed lockfile at $FILE"

    rangemusique-script:
      data:
        run-rangemusique.sh: |
          #!/bin/bash

          FILE=/out/.soularr.lock
          if [ -f $FILE ]; then
            echo "soularr lockfile detected, not running rangemusique"
          else
            echo "soularr lockfile not detected, running rangemusique"
            /app/main
          fi

cnpg-cluster-jellystat:
  type: postgresql
  mode: standalone
  version:
    postgresql: "18"
  cluster:
    instances: 1
    imageCatalogRef:
      kind: ClusterImageCatalog
      name: postgresql
    storage:
      size: 5Gi
    roles:
      - name: jellystat
        connectionLimit: -1
        ensure: present
        createdb: true
        inherit: true
        login: true
    resources: {}
    primaryUpdateMethod: switchover
    primaryUpdateStrategy: unsupervised
    logLevel: "info"
    monitoring:
      enabled: true
      podMonitor:
        enabled: true
      prometheusRule:
        excludeRules:
          - CNPGClusterLogicalReplicationErrorsCritical
          - CNPGClusterLogicalReplicationErrors
          - CNPGClusterLogicalReplicationStoppedCritical
          - CNPGClusterLogicalReplicationStopped
          - CNPGClusterHACritical
          - CNPGClusterHAWarning
    postgresql: {}
    initdb:
      database: jellystat
