    filebrowser-quantum:
      controller: filebrowser-quantum
      type: ClusterIP
      ports:
        http:
          port: 8080
    slskd:
      controller: slskd
      type: ClusterIP
      ports:
        http:
          port: 5030

  ingress:
    jellyfin:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: home.terence.cloud
        traefik.ingress.kubernetes.io/router.middlewares: traefik-modsecurity@kubernetescrd
      className: "traefik"
      hosts:
        - host: &host jf.terence.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: jellyfin
                port: http
      tls:
        - secretName: jellyfin-tls
          hosts:
            - *host

    jellyfin-media:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: home.terence.cloud
        traefik.ingress.kubernetes.io/router.priority: "100"
      className: "traefik"
      hosts:
        - host: &host jf.terence.cloud
          paths:
            - path: /videos
              pathType: Prefix
              service:
                identifier: jellyfin
                port: http
            - path: /audio
              pathType: Prefix
              service:
                identifier: jellyfin
                port: http
            - path: /socket.io
              pathType: Prefix
              service:
                identifier: jellyfin
                port: http
      tls:
        - secretName: jellyfin-tls
          hosts:
            - *host

    jellyseerr:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: home.terence.cloud
        traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-sablier-js@kubernetescrd,traefik-modsecurity@kubernetescrd"
      className: "traefik"
      hosts:
        - host: &host js.terence.cloud
          paths:
