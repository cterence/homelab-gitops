apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud-share
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/target: home.terence.cloud
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  ingressClassName: traefik
  rules:
    - host: share.terence.cloud
      http:
        paths:
          - backend:
              service:
                name: nextcloud
                port:
                  name: http
            path: /s
            pathType: Prefix
          - backend:
              service:
                name: nextcloud
                port:
                  name: http
            path: /apps
            pathType: Prefix
          - backend:
              service:
                name: nextcloud
                port:
                  name: http
            path: /core
            pathType: Prefix
          - backend:
              service:
                name: nextcloud
                port:
                  name: http
            path: /dist
            pathType: Prefix
          - backend:
              service:
                name: nextcloud
                port:
                  name: http
            path: /public.php/dav/files/
            pathType: Prefix
  tls:
    - hosts:
      - share.terence.cloud
      secretName: nextcloud-share-tls
