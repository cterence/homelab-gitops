apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-backup-s3-creds
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-secret-store
  target:
    name: cnpg-backup-s3-creds
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: versity-gw/versity-gw-credentials
        property: ROOT_ACCESS_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: versity-gw/versity-gw-credentials
        property: ROOT_SECRET_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
