apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich-server-share
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/target: home.terence.cloud
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  ingressClassName: traefik
  rules:
    - host: imms.terence.cloud
      http:
        paths:
          - backend:
              service:
                name: immich-server
                port:
                  name: http
            path: /s
            pathType: Prefix
          - backend:
              service:
                name: immich-server
                port:
                  name: http
            path: /_app
            pathType: Prefix
          - backend:
              service:
                name: immich-server
                port:
                  name: http
            path: /api/assets
            pathType: Prefix
  tls:
    - hosts:
      - imms.terence.cloud
      secretName: immich-share-tls
