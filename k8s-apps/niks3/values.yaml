# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
app-template:
  defaultPodOptions:
    automountServiceAccountToken: false
    securityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"

  configMaps:
    config:
      data:
        oidc.json: |
          {
            "providers": {
              "github": {
                "issuer": "https://token.actions.githubusercontent.com",
                "audience": "https://niks3.terence.cloud",
                "bound_claims": {
                  "repository_owner": ["cterence"]
                },
                "bound_subject": ["repo:cterence/nixos-config:*"]
              }
            }
          }

  controllers:
    main:
      type: deployment
      strategy: RollingUpdate
      annotations:
        reloader.stakater.com/auto: "true"
      containers:
        main:
          image:
            repository: ghcr.io/mic92/niks3
            tag: v1.4.0
          envFrom:
            - secretRef:
                name: versity-credentials
            - secretRef:
                name: api-token
          env:
            TZ: Europe/Paris
            NIKS3_DB:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-cnpg-cluster-app"
                  key: fqdn-uri
            NIKS3_S3_ENDPOINT: versity.terence.cloud
            NIKS3_S3_BUCKET: nix-cache
            NIKS3_S3_REGION: us-east-1
            NIKS3_SIGN_KEY_PATHS: /secrets/signing-key
            NIKS3_ENABLE_READ_PROXY: "true"
          args:
            - --oidc-config
            - /config/oidc.json
          ports:
            - name: http
              containerPort: 5751
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 5751

  ingress:
    main:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: home.terence.cloud
        # traefik.ingress.kubernetes.io/router.tls.options: cert-manager-client-auth@kubernetescrd
        # traefik.ingress.kubernetes.io/router.middlewares: "traefik-modsecurity@kubernetescrd"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
      className: "traefik"
      hosts:
        - host: &host niks3.terence.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: niks3-tls
          hosts:
            - *host

  persistence:
    signing-key:
      type: secret
      name: signing-key
      advancedMounts:
        main:
          main:
            - path: /secrets/signing-key
              subPath: signing-key
              readOnly: true

    oidc:
      type: configMap
      identifier: config
      advancedMounts:
        main:
          main:
            - path: /config/oidc.json
              subPath: oidc.json
              readOnly: true

  rawResources:
    signing-key:
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      spec:
        spec:
          secretStoreRef:
            kind: ClusterSecretStore
            name: gitlab-secret-store
          target:
            name: signing-key
            creationPolicy: Owner
          data:
            - secretKey: signing-key
              remoteRef:
                key: niks3_signing_key
    versity:
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      spec:
        spec:
          secretStoreRef:
            kind: ClusterSecretStore
            name: gitlab-secret-store
          target:
            name: versity-credentials
            creationPolicy: Owner
          data:
            - secretKey: NIKS3_S3_ACCESS_KEY
              remoteRef:
                key: versity_root_access_key
            - secretKey: NIKS3_S3_SECRET_KEY
              remoteRef:
                key: versity_root_secret_key
    api-token:
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      spec:
        spec:
          secretStoreRef:
            kind: ClusterSecretStore
            name: gitlab-secret-store
          target:
            name: api-token
            creationPolicy: Owner
          data:
            - secretKey: NIKS3_API_TOKEN
              remoteRef:
                key: niks3_api_token

cnpg-cluster:
  type: postgresql
  mode: standalone
  version:
    postgresql: "18"
  cluster:
    instances: 1
    imageCatalogRef:
      kind: ClusterImageCatalog
      name: postgresql
    storage:
      size: 5Gi
    primaryUpdateMethod: switchover
    primaryUpdateStrategy: unsupervised
    logLevel: "info"
    monitoring:
      enabled: true
      podMonitor:
        enabled: true
      prometheusRule:
        excludeRules:
          - CNPGClusterLogicalReplicationErrorsCritical
          - CNPGClusterLogicalReplicationErrors
          - CNPGClusterLogicalReplicationStoppedCritical
          - CNPGClusterLogicalReplicationStopped
          - CNPGClusterHACritical
          - CNPGClusterHAWarning
    postgresql: {}
    initdb:
      database: niks3
