metallb:
  prometheus:
    serviceAccount: kube-prometheus-stack-prometheus
    namespace: monitoring
    podMonitor:
      enabled: true
    prometheusRule:
      enabled: true
    serviceMonitor:
      enabled: false
  frrk8s:
    enabled: false
addressPools:
  - name: default
    autoassign: true
    addresses:
      - 192.168.1.240-192.168.1.255
