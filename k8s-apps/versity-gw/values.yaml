# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/library/common/values.schema.json
app-template:
  defaultPodOptions:
    automountServiceAccountToken: false
    securityContext:
      runAsUser: 1000
      runAsGroup: 100
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"

  configMaps:
    versity:
      data:
        VGW_HEALTH: /health
        VGW_REGION: eu-west-3

  controllers:
    main:
      type: deployment
      strategy: Recreate
      annotations:
        reloader.stakater.com/auto: "true"
      pod:
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - "{{ .Release.Name }}"
                topologyKey: kubernetes.io/hostname
      containers:
        main:
          image:
            repository: ghcr.io/versity/versitygw
            tag: v1.3.1@sha256:a86791b684a1dd3c5a255ca755bb51783a72696cf1b5a843f800b08bfd6f921c
          args:
            - posix
            - /buckets
            - --chuid
            - --chgid
          env:
            TZ: Europe/Paris
          envFrom:
            - configMapRef:
                identifier: versity
            - secretRef:
                name: versity-gw-credentials
          ports:
            - name: http
              containerPort: 7070
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health

    webdav:
      type: deployment
      strategy: Recreate
      labels:
        sablier.enable: "true"
        sablier.group: "{{ .Release.Name }}"
      annotations:
        reloader.stakater.com/auto: "true"
      pod:
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - "{{ .Release.Name }}"
                topologyKey: kubernetes.io/hostname
      containers:
        webdav:
          image:
            repository: ghcr.io/cterence/apachewebdav
            tag: 2.4.65-bookworm@sha256:0aa4a0b399a5711005fcb38e8a6776f5518b18aa514f44f0da8e6fdb46333e77
          env:
            TZ: Europe/Paris
            UID: "1000"
            GID: "100"
            USERNAME: kindle
            NO_CHOWN_DATA: "true"
            PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-webdav-password"
                  key: password
          ports:
            - name: http
              containerPort: 80
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health

    nfs:
      type: deployment
      strategy: Recreate
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
        velero.io/exclude-from-backup: "true"
      pod:
        labels:
          velero.io/exclude-from-backup: "true"
        affinity:
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - "{{ .Release.Name }}"
                topologyKey: kubernetes.io/hostname
      containers:
        main:
          image:
            repository: ghcr.io/versity/versitygw
            tag: v1.3.1@sha256:a86791b684a1dd3c5a255ca755bb51783a72696cf1b5a843f800b08bfd6f921c
          args:
            - posix
            - --sidecar
            - /tmp/sidecar
            - /buckets
          env:
            TZ: Europe/Paris
          envFrom:
            - configMapRef:
                identifier: versity
            - secretRef:
                name: versity-gw-credentials
          ports:
            - name: http
              containerPort: 7070
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 7070
    nfs:
      controller: nfs
      type: ClusterIP
      ports:
        http:
          port: 7070
    webdav:
      controller: webdav
      type: ClusterIP
      ports:
        http:
          port: 80

  ingress:
    main:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: home.terence.cloud
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        traefik.ingress.kubernetes.io/router.middlewares: traefik-modsecurity@kubernetescrd
      className: "traefik"
      hosts:
        - host: &host versity.terence.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: versity-tls
          hosts:
            - *host
    webdav:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: home.terence.cloud
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
        traefik.ingress.kubernetes.io/router.middlewares: traefik-strip-first-path@kubernetescrd,traefik-modsecurity@kubernetescrd,{{ .Release.Namespace }}-sablier@kubernetescrd
      className: "traefik"
      hosts:
        - host: &host versity.terence.cloud
          paths:
            - path: /webdav
              pathType: Prefix
              service:
                identifier: webdav
                port: http
      tls:
        - secretName: versity-tls
          hosts:
            - *host

  persistence:
    buckets:
      type: persistentVolumeClaim
      annotations:
        helm.sh/resource-policy: keep
        argocd.argoproj.io/sync-options: Delete=false
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        main:
          main:
            - path: /buckets
        webdav:
          webdav:
            - path: /var/lib/dav/data
              subPath: obsidian/Kindle

    nfs:
      type: persistentVolumeClaim
      existingClaim: mx500-homelab3
      advancedMounts:
        nfs:
          main:
            - path: /buckets
              subPath: versity-gw

    nfs-xattrs:
      enabled: true
      type: emptyDir
      advancedMounts:
        nfs:
          main:
            - path: /tmp/sidecar

  rawResources:
    sablier:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      forceRename: sablier
      spec:
        spec:
          plugin:
            sablier:
              dynamic:
                displayName: "{{ .Release.Name }}"
                refreshFrequency: 5s
                showDetails: true
                theme: shuffle
              sablierUrl: http://sablier-sablier.sablier:10000
              sessionDuration: 10m
              ignoreUserAgent: curl
              group: "{{ .Release.Name }}"
